<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Azul — партия против бота</title>
<meta name="description" content="Azul: сыграйте партию 1 на 1 против бота по полным правилам.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
<style>
  :root {
    --ground: #ede4d3; --panel: #f7f1e4; --panel-edge: #d8cdb6; --cell-ground: #e6dcc8;
    --ink: #322f28; --muted: #7d7563; --accent: #2f5fa8; --accent-ink: #24497f; --on-accent: #fff;
    --good: #2e6b40; --bad: #a33325; --warn-bg: #f2e8cd; --warn: #8a6114;
    --tile-shadow: 0 2px 5px rgba(60,45,20,.30), 0 1px 1px rgba(60,45,20,.2);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: "Avenir Next", "Helvetica Neue", "Segoe UI", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #191d26; --panel: #222735; --panel-edge: #39415455; --cell-ground: #1d222e;
      --ink: #e7e2d6; --muted: #99a0b1; --accent: #7ba3dd; --accent-ink: #a8c4ec; --on-accent: #14202f;
      --good: #85c493; --bad: #e28a77; --warn-bg: #362f1c; --warn: #d9ac4f;
      --tile-shadow: 0 2px 6px rgba(0,0,0,.5), 0 1px 1px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ground); color: var(--ink); font-family: var(--sans); line-height: 1.4; }

  .c0 { --tc: #2b5ea7; } .c1 { --tc: #e0ab33; } .c2 { --tc: #b23a2b; } .c3 { --tc: #4a4750; } .c4 { --tc: #8fcac2; }
  .tile {
    display: inline-block; vertical-align: middle;
    width: var(--ts, 34px); height: var(--ts, 34px); border-radius: 4px; position: relative;
    background:
      radial-gradient(circle at 30% 24%, rgba(255,255,255,.38), rgba(255,255,255,0) 55%),
      linear-gradient(160deg, color-mix(in srgb, var(--tc) 92%, white) 0%, var(--tc) 55%, color-mix(in srgb, var(--tc) 82%, black) 100%);
    border: 1px solid color-mix(in srgb, var(--tc) 60%, black);
    box-shadow: var(--tile-shadow);
    flex: 0 0 auto;
  }
  .tile::after {
    content: ""; position: absolute; inset: 26%; transform: rotate(45deg); border-radius: 2px;
    border: 2px solid rgba(255,255,255,.45);
  }
  .tile.c1::after { border-color: rgba(140,80,8,.5); } .tile.c4::after { border-color: rgba(19,98,92,.55); }
  /* керамика Nano Banana поверх CSS-фолбэка */
  .tile.c0, .wcell.on.c0 { background: url('assets/tile0.png') center/cover; }
  .tile.c1, .wcell.on.c1 { background: url('assets/tile1.png') center/cover; }
  .tile.c2, .wcell.on.c2 { background: url('assets/tile2.png') center/cover; }
  .tile.c3, .wcell.on.c3 { background: url('assets/tile3.png') center/cover; }
  .tile.c4, .wcell.on.c4 { background: url('assets/tile4.png') center/cover; }
  .tile::after { display: none; }
  .botava { width: 26px; height: 26px; border-radius: 5px; box-shadow: var(--tile-shadow); }
  .token {
    width: var(--ts, 34px); height: var(--ts, 34px); border-radius: 50%; flex: 0 0 auto;
    background: linear-gradient(160deg, #efe6d2, #cbbfa4); border: 1px solid #a2946f;
    display: flex; align-items: center; justify-content: center;
    font: 700 15px var(--serif); color: #6b5d38;
  }

  .stub { display: none; padding: 60px 24px; text-align: center; font-size: 17px; }
  .stub a { color: var(--accent); }
  @media (max-width: 999px) { .stub { display: block; } .game { display: none !important; } }

  .game { max-width: 1180px; margin: 0 auto; padding: 18px 24px 48px; }
  header.top { display: flex; align-items: baseline; gap: 18px; margin-bottom: 14px; flex-wrap: wrap; }
  .brand { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .brand a { color: inherit; text-decoration: none; }
  #status { font-family: var(--serif); font-size: 22px; }
  #status .think { color: var(--muted); }
  header.top .sp { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  button.act {
    font: 600 14px var(--sans); color: var(--accent-ink); background: transparent;
    border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--panel-edge));
    border-radius: 8px; padding: 8px 14px; cursor: pointer;
  }
  button.act:hover { background: color-mix(in srgb, var(--accent) 10%, transparent); }
  button.act:disabled { opacity: .5; cursor: default; }
  .grp.hint { border-color: var(--warn); background: color-mix(in srgb, var(--warn) 16%, transparent); }
  .pline.hint, .floorline.hint { border-color: var(--warn); background: color-mix(in srgb, var(--warn) 12%, transparent); }
  .hintbox {
    background: var(--warn-bg); border: 1px solid color-mix(in srgb, var(--warn) 35%, transparent);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; font-size: 14px;
  }
  .hintbox b { color: var(--warn); }
  .hintbox ul { margin: 6px 0 0; padding-left: 20px; }
  .hintbox li { margin: 3px 0; }
  .hintbox .strat { margin-top: 9px; padding-top: 8px; border-top: 1px dashed color-mix(in srgb, var(--warn) 35%, transparent); }
  .hintbox .strat b { color: var(--accent-ink); }
  a.back { font-size: 13px; color: var(--muted); }

  /* supply row */
  .supply {
    display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
  }
  .factory {
    width: 122px; height: 122px; border-radius: 50%;
    background: url('assets/plate.png') center/contain no-repeat;
    display: flex; flex-wrap: wrap; gap: 2px; align-content: center; justify-content: center;
    padding: 16px; --ts: 24px;
  }
  .factory .grp { flex-wrap: wrap; justify-content: center; max-width: 56px; gap: 2px; padding: 2px; }
  .factory.empty { opacity: .35; }
  .cpool {
    min-height: 108px; flex: 1; border-radius: 14px; border: 2px dashed var(--panel-edge);
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 12px 14px;
  }
  .cpool .lbl { color: var(--muted); font-size: 13px; margin-right: 6px; }
  .grp { display: flex; gap: 4px; padding: 4px; border-radius: 8px; border: 2px solid transparent; }
  .grp.pickable { cursor: pointer; }
  .grp.pickable:hover { border-color: color-mix(in srgb, var(--accent) 45%, transparent); }
  .grp.picked { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
  .grp.bot-took { border-color: var(--bad); }

  /* boards */
  .boards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .pboard { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 14px; padding: 14px 16px; }
  .pboard.turn { outline: 3px solid color-mix(in srgb, var(--accent) 55%, transparent); }
  .pb-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .pb-name { font-weight: 700; }
  .pb-score { margin-left: auto; font-family: var(--serif); font-size: 26px; font-variant-numeric: tabular-nums; }
  .pb-grid { display: grid; grid-template-columns: auto auto; gap: 6px 14px; justify-content: start; }
  .plines { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
  .pline { display: flex; gap: 5px; padding: 3px; border-radius: 7px; border: 2px solid transparent; }
  .pline .slot {
    width: var(--ts, 34px); height: var(--ts, 34px); border-radius: 4px;
    border: 1px dashed color-mix(in srgb, var(--muted) 45%, transparent);
    background: color-mix(in srgb, var(--cell-ground) 70%, transparent);
  }
  .pline.legal { border-color: color-mix(in srgb, var(--good) 70%, transparent); cursor: pointer; }
  .pline.legal:hover { background: color-mix(in srgb, var(--good) 14%, transparent); }
  .wall { display: flex; flex-direction: column; gap: 5px; }
  .wrow { display: flex; gap: 5px; }
  .wcell {
    width: var(--ts, 34px); height: var(--ts, 34px); border-radius: 4px; position: relative;
    background: color-mix(in srgb, var(--tc) 14%, var(--cell-ground));
    border: 1px solid color-mix(in srgb, var(--tc) 38%, var(--panel-edge));
    box-shadow: inset 0 1px 3px rgba(0,0,0,.12);
  }
  .wcell.on {
    background:
      radial-gradient(circle at 30% 24%, rgba(255,255,255,.38), rgba(255,255,255,0) 55%),
      linear-gradient(160deg, color-mix(in srgb, var(--tc) 92%, white) 0%, var(--tc) 55%, color-mix(in srgb, var(--tc) 82%, black) 100%);
    border-color: color-mix(in srgb, var(--tc) 60%, black);
    box-shadow: var(--tile-shadow);
  }
  .wcell.fresh { outline: 3px solid var(--accent); outline-offset: 1px; }
  .floorline { display: flex; gap: 5px; margin-top: 12px; padding: 4px; border-radius: 8px; border: 2px solid transparent; align-items: center; }
  .floorline.legal { border-color: color-mix(in srgb, var(--bad) 55%, transparent); cursor: pointer; }
  .floorline.legal:hover { background: color-mix(in srgb, var(--bad) 10%, transparent); }
  .fslot {
    width: var(--ts, 34px); height: var(--ts, 34px); border-radius: 4px; position: relative;
    border: 1px dashed color-mix(in srgb, var(--bad) 40%, var(--panel-edge));
    display: flex; align-items: center; justify-content: center;
    font: 600 11px var(--sans); color: var(--muted);
  }
  .fslot > * { position: absolute; inset: 0; margin: auto; }

  .pboard.compact { --ts: 26px; }
  .pboard.compact .pb-score { font-size: 22px; }

  /* log */
  .log { margin-top: 14px; font-size: 13px; color: var(--muted); display: flex; flex-direction: column-reverse; gap: 3px; max-height: 130px; overflow-y: auto; }
  .log b { color: var(--ink); }

  /* overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(20, 16, 8, .45); z-index: 30;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .sheet {
    background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 16px;
    padding: 24px 28px; max-width: 520px; width: 100%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .sheet h2 { font-family: var(--serif); margin: 0 0 12px; font-size: 24px; }
  .sheet table { border-collapse: collapse; width: 100%; font-size: 14px; margin-bottom: 8px; }
  .sheet td { padding: 5px 0; border-bottom: 1px solid var(--panel-edge); }
  .sheet td:last-child { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .sheet .mut { color: var(--muted); }
  .sheet .pts { color: var(--good); } .sheet .pen { color: var(--bad); }
  .sheet .go { font-family: var(--serif); font-size: 40px; margin: 6px 0 2px; }
  .sheet button.act { margin-top: 14px; background: var(--accent); color: var(--on-accent); border: none; padding: 11px 20px; font-size: 15px; }
  .sheet button.act.ghost {
    background: transparent; color: var(--accent-ink);
    border: 1px solid color-mix(in srgb, var(--accent) 45%, var(--panel-edge));
  }
  .mistake {
    background: var(--warn-bg); border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent);
    border-radius: 9px; padding: 9px 12px; font-size: 13.5px;
  }
  .mistake .better { color: var(--good); font-weight: 600; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="stub">
  🖥 Игровой стол Azul рассчитан на экран компьютера (от 1000px).<br><br>
  На телефоне загляните в <a href="/">калькулятор счёта Azul</a>.
</div>

<div class="game">
  <header class="top">
    <div class="brand"><a href="/">AZUL</a> · партия против бота</div>
    <div id="status" aria-live="polite"></div>
    <div class="sp">
      <a class="back" href="/">калькулятор счёта →</a>
      <button class="act" id="btnSound" title="Звук"></button>
      <button class="act" id="btnHint" title="Сильный бот подскажет ваш ход">💡 Подсказка</button>
      <select class="act" id="level" title="Сила бота" aria-label="Сила бота">
        <option value="1">Бот: лёгкий</option>
        <option value="2" selected>Бот: сильный</option>
      </select>
      <button class="act" id="btnNew">Новая партия</button>
    </div>
  </header>

  <section class="supply" id="supply"></section>

  <section class="hintbox" id="hintbox" hidden></section>

  <section class="boards">
    <div class="pboard" id="pb0"></div>
    <div class="pboard compact" id="pb1"></div>
  </section>

  <div class="log" id="log"></div>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Итоги"></div>
</div>

<script type="module">
import { newGame, legalMoves, applyMove, isDraftOver, resolveRound } from './engine.js?v=6';
import { chooseMove, _valueOfMove } from './bot.js?v=6';

const COLOR_NAMES = ['синюю', 'жёлтую', 'красную', 'чёрную', 'бирюзовую'];
const COLOR_PL = ['синих', 'жёлтых', 'красных', 'чёрных', 'бирюзовых'];
const FLOOR_LABELS = ['−1', '−1', '−2', '−2', '−2', '−3', '−3'];
const HUMAN = 0, BOT = 1;
const el = (id) => document.getElementById(id);

let game = null;
let selected = null;      // {source, factory?, color}
let busy = false;         // ходит бот / открыт оверлей
let botSeedBase = 1;
let moveNo = 0;
let gameToken = 0;        // защита от запоздалых ответов воркера после «Новой партии»

// бот L2 думает в воркере, чтобы страница не замирала; фолбэк — синхронный вызов
let botWorker = null, reqId = 0;
const pendingBot = new Map();
try {
  botWorker = new Worker(new URL('./bot-worker.js?v=6', import.meta.url), { type: 'module' });
  botWorker.onmessage = (e) => {
    const { id, move, error } = e.data;
    const cb = pendingBot.get(id);
    if (!cb) return;
    pendingBot.delete(id);
    if (error || !move) cb.reject(new Error(error ? error.message : 'empty move'));
    else cb.resolve(move);
  };
  botWorker.onerror = () => {
    botWorker = null;
    for (const cb of pendingBot.values()) cb.reject(new Error('worker failed'));
    pendingBot.clear();
  };
} catch { botWorker = null; }

// Никогда не зависаем: воркер → main-thread → уровень 1 → первый легальный ход.
function botFallback(state, opts) {
  try { return chooseMove(state, opts); } catch {}
  try { return chooseMove(state, { ...opts, level: 1 }); } catch {}
  return legalMoves(state)[0];
}
function askBot(state, opts) {
  if (!botWorker) return Promise.resolve(botFallback(state, opts));
  return new Promise((resolve, reject) => {
    const id = ++reqId;
    const timer = setTimeout(() => { // страховка: воркер молчит дольше 8с — считаем его потерянным
      if (pendingBot.delete(id)) reject(new Error('worker timeout'));
    }, 8000);
    pendingBot.set(id, {
      resolve: (m) => { clearTimeout(timer); resolve(m); },
      reject: (e) => { clearTimeout(timer); reject(e); },
    });
    botWorker.postMessage({ id, state, opts });
  }).catch(() => botFallback(state, opts));
}
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// ---------- звук: синтез керамики через WebAudio, без файлов ----------
const Sound = (() => {
  let ctx = null;
  let enabled = (localStorage.getItem('azul-sound') ?? '1') === '1';
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function clack(vol = 0.5) {
    if (!enabled) return;
    try {
      const c = ac(), t = c.currentTime;
      // короткий шумовой щелчок через полосовой фильтр — «стук глазури»
      const buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.045), c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.2);
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.value = 1700 + Math.random() * 900; bp.Q.value = 1.4;
      const g = c.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      src.connect(bp); bp.connect(g); g.connect(c.destination); src.start(t);
      // лёгкий фарфоровый звон
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.value = 2100 + Math.random() * 700;
      const g2 = c.createGain();
      g2.gain.setValueAtTime(vol * 0.1, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.connect(g2); g2.connect(c.destination); o.start(t); o.stop(t + 0.09);
    } catch {}
  }
  function chime(kind) { // 'win' | 'lose' | 'tie'
    if (!enabled) return;
    try {
      const c = ac(), t = c.currentTime;
      const notes = kind === 'win' ? [523.25, 659.25, 783.99, 1046.5]
                  : kind === 'lose' ? [392, 349.23, 293.66]
                  : [440, 440];
      notes.forEach((f, i) => {
        const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t + i * 0.13);
        g.gain.exponentialRampToValueAtTime(0.16, t + i * 0.13 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.13 + 0.55);
        o.connect(g); g.connect(c.destination);
        o.start(t + i * 0.13); o.stop(t + i * 0.13 + 0.6);
      });
    } catch {}
  }
  return {
    clack, chime,
    pick: () => clack(0.22),
    get enabled() { return enabled; },
    toggle() { enabled = !enabled; localStorage.setItem('azul-sound', enabled ? '1' : '0'); return enabled; },
  };
})();
let botTook = null;       // подсветка последнего взятия бота: {source, factory?, color}
let hintMove = null;      // подсказка тренера: полный Move для подсветки
let history = [];         // ходы игрока для пост-разбора: {state (до хода), move, round}
let freshCells = [];      // [player, r, c] — свежие плитки на стене после раунда
const logLines = [];

function startGame() {
  const seed = (Math.floor(Math.random() * 0xffffffff)) >>> 0;
  game = newGame(seed, { startPlayer: HUMAN });
  botSeedBase = (seed ^ 0x9e3779b9) >>> 0;
  gameToken++;
  moveNo = 0; selected = null; busy = false; botTook = null; freshCells = []; hintMove = null;
  history = [];
  logLines.length = 0;
  addLog(`Новая партия (сид ${seed}). Вы ходите первым.`);
  el('overlay').hidden = true;
  render();
}

function addLog(html) {
  logLines.push(html);
  const box = el('log');
  box.innerHTML = logLines.slice(-40).map((s) => `<div>${s}</div>`).join('');
}

// ---------- рендер ----------

function tileHtml(c, extra = '') { return `<span class="tile c${c} ${extra}"></span>`; }

function grpAttrs(source, f, c) {
  const pickable = !busy && game.phase === 'draft' && game.current === HUMAN;
  const isSel = selected && selected.source === source && selected.factory === f && selected.color === c;
  const isBot = botTook && botTook.source === source && botTook.factory === f && botTook.color === c;
  const isHint = hintMove && hintMove.source === source && hintMove.factory === f && hintMove.color === c;
  return `class="grp ${pickable ? 'pickable' : ''} ${isSel ? 'picked' : ''} ${isBot ? 'bot-took' : ''} ${isHint ? 'hint' : ''}"
          data-src="${source}" ${f !== undefined ? `data-f="${f}"` : ''} data-c="${c}"`;
}

function renderSupply() {
  let html = '';
  for (let f = 0; f < 5; f++) {
    const total = game.factories[f].reduce((a, b) => a + b, 0);
    html += `<div class="factory ${total === 0 ? 'empty' : ''}">`;
    for (let c = 0; c < 5; c++) {
      const n = game.factories[f][c];
      if (n > 0) html += `<span ${grpAttrs('factory', f, c)}>${tileHtml(c).repeat(n)}</span>`;
    }
    html += `</div>`;
  }
  html += `<div class="cpool"><span class="lbl">центр:</span>`;
  if (game.firstTakenBy === null && game.phase === 'draft') html += `<span class="token">1</span>`;
  let centerEmpty = true;
  for (let c = 0; c < 5; c++) {
    const n = game.center[c];
    if (n > 0) { centerEmpty = false; html += `<span ${grpAttrs('center', undefined, c)}>${tileHtml(c).repeat(n)}</span>`; }
  }
  if (centerEmpty) html += `<span class="lbl">пусто</span>`;
  html += `</div>`;
  el('supply').innerHTML = html;
}

function renderBoard(p) {
  const pl = game.players[p];
  const box = el('pb' + p);
  const legalDests = new Set();
  if (p === HUMAN && selected && !busy) {
    for (const m of legalMoves(game)) {
      if (m.source === selected.source && m.color === selected.color &&
          (selected.source === 'center' || m.factory === selected.factory)) {
        legalDests.add(m.dest);
      }
    }
  }
  let html = `<div class="pb-head">${p === BOT ? '<img class="botava" src="assets/avatar.png" alt="">' : ''}<span class="pb-name">${p === HUMAN ? 'Вы' : 'Бот'}</span>
    ${game.startPlayer === p && game.phase === 'draft' ? '<span class="token" style="--ts:20px;width:20px;height:20px;font-size:11px;display:inline-flex;">1</span>' : ''}
    <span class="pb-score">${pl.score}</span></div>`;
  html += `<div class="pb-grid"><div class="plines">`;
  for (let d = 0; d < 5; d++) {
    const line = pl.lines[d];
    html += `<div class="pline ${legalDests.has(d) ? 'legal' : ''} ${p === HUMAN && hintMove && hintMove.dest === d ? 'hint' : ''}" data-dest="${d}">`;
    for (let i = d; i >= 0; i--) {
      html += i < line.count ? tileHtml(line.color) : `<span class="slot"></span>`;
    }
    html += `</div>`;
  }
  html += `</div><div class="wall">`;
  for (let r = 0; r < 5; r++) {
    html += `<div class="wrow">`;
    for (let c = 0; c < 5; c++) {
      const k = (c - r + 5) % 5;
      const fresh = freshCells.some(([fp, fr, fc]) => fp === p && fr === r && fc === c);
      html += `<span class="wcell c${k} ${pl.wall[r][c] ? 'on' : ''} ${fresh ? 'fresh' : ''}"></span>`;
    }
    html += `</div>`;
  }
  html += `</div></div>`;
  // пол
  const floorItems = [];
  if (pl.hasToken) floorItems.push(`<span class="token"></span>`);
  for (let c = 0; c < 5; c++) for (let i = 0; i < pl.floor[c]; i++) floorItems.push(tileHtml(c));
  html += `<div class="floorline ${legalDests.has('floor') ? 'legal' : ''} ${p === HUMAN && hintMove && hintMove.dest === 'floor' ? 'hint' : ''}" data-dest="floor">`;
  for (let i = 0; i < 7; i++) {
    html += `<span class="fslot">${floorItems[i] || FLOOR_LABELS[i]}</span>`;
  }
  html += `</div>`;
  box.innerHTML = html;
  box.classList.toggle('turn', game.phase === 'draft' && game.current === p && !busy);
}

function renderStatus() {
  let t;
  if (game.phase === 'over') t = 'Партия окончена';
  else if (!el('overlay').hidden) t = `Раунд ${game.round}`;
  else if (busy && game.current === BOT) t = `Раунд ${game.round} · <span class="think">бот думает…</span>`;
  else if (game.current === HUMAN) t = `Раунд ${game.round} · ваш ход${selected ? ' — выберите ряд' : ''}`;
  else t = `Раунд ${game.round}`;
  el('status').innerHTML = t;
}

function render() {
  renderSupply();
  renderBoard(0);
  renderBoard(1);
  renderStatus();
  el('hintbox').hidden = !hintMove;
}

// ---------- взаимодействие ----------

el('supply').addEventListener('click', (e) => {
  const g = e.target.closest('.grp');
  if (!g || busy || game.phase !== 'draft' || game.current !== HUMAN) return;
  const src = g.dataset.src;
  const sel = { source: src, color: Number(g.dataset.c) };
  if (src === 'factory') sel.factory = Number(g.dataset.f);
  const same = selected && selected.source === sel.source && selected.factory === sel.factory && selected.color === sel.color;
  selected = same ? null : sel;
  hintMove = null;
  if (selected) Sound.pick();
  render();
});

const btnSound = el('btnSound');
btnSound.textContent = Sound.enabled ? '🔊' : '🔇';
btnSound.addEventListener('click', () => {
  btnSound.textContent = Sound.toggle() ? '🔊' : '🔇';
  if (Sound.enabled) Sound.pick();
});

el('btnHint').addEventListener('click', async () => {
  if (busy || !game || game.phase !== 'draft' || game.current !== HUMAN) return;
  const btn = el('btnHint');
  btn.disabled = true; btn.textContent = '💡 думаю…';
  const token = gameToken, mn = moveNo;
  const mv = await askBot(game, { level: 2, seed: (botSeedBase ^ 0x5bd1e995 ^ moveNo) >>> 0, timeMs: 1000 });
  btn.disabled = false; btn.textContent = '💡 Подсказка';
  if (token !== gameToken || mn !== moveNo || game.phase !== 'draft' || game.current !== HUMAN) return;
  hintMove = mv;
  selected = null;
  const n = mv.source === 'factory' ? game.factories[mv.factory][mv.color] : game.center[mv.color];
  const from = mv.source === 'factory' ? `с фабрики ${mv.factory + 1}` : 'из центра';
  const to = mv.dest === 'floor' ? 'на пол' : `в ряд ${mv.dest + 1}`;
  const tips = explainHint(game, mv);
  const strat = strategyAdvice(game);
  el('hintbox').innerHTML = `<b>💡 Тренер:</b> взять ${n} ${COLOR_PL[mv.color]} ${from} → ${to}` +
    (tips.length ? `<ul>${tips.map((t) => `<li>${t}</li>`).join('')}</ul>` : '') +
    (strat.length ? `<div class="strat"><b>🧭 Стратегия на партию:</b><ul>${strat.map((t) => `<li>${t}</li>`).join('')}</ul></div>` : '');
  addLog(`<b>💡 Совет</b>: ${n} ${COLOR_PL[mv.color]} ${from} → ${to}`);
  render();
});

const COLOR_NOM = ['синий', 'жёлтый', 'красный', 'чёрный', 'бирюзовый'];

// очки, как будто плитка уже стоит на стене в (r,c)
function hypoScore(wall, r, c) {
  let h = 1, v = 1;
  for (let cc = c - 1; cc >= 0 && wall[r][cc]; cc--) h++;
  for (let cc = c + 1; cc < 5 && wall[r][cc]; cc++) h++;
  for (let rr = r - 1; rr >= 0 && wall[rr][c]; rr--) v++;
  for (let rr = r + 1; rr < 5 && wall[rr][c]; rr++) v++;
  let s = 0;
  if (h > 1) s += h;
  if (v > 1) s += v;
  return s === 0 ? 1 : s;
}

function explainHint(s, mv) {
  const tips = [];
  const me = s.players[HUMAN], opp = s.players[BOT];
  const n = mv.source === 'factory' ? s.factories[mv.factory][mv.color] : s.center[mv.color];

  // что даёт сам ход
  if (mv.dest !== 'floor') {
    const line = me.lines[mv.dest];
    const cap = mv.dest + 1;
    const after = Math.min(cap, line.count + n);
    const overflow = Math.max(0, line.count + n - cap);
    if (after === cap) {
      const col = (mv.dest + mv.color) % 5;
      let t = `Линия ${mv.dest + 1} закроется — плитка встанет на стену и принесёт ~${hypoScore(me.wall, mv.dest, col)} очк.`;
      let colCnt = 0;
      for (let rr = 0; rr < 5; rr++) if (me.wall[rr][col]) colCnt++;
      if (colCnt === 4) t += ' И это пятая плитка столбца: +7!';
      tips.push(t);
    } else {
      tips.push(`Линия ${mv.dest + 1} дозаполнится до ${after}/${cap} — задел на закрытие в следующем раунде.`);
    }
    if (overflow > 0) tips.push(`Цена: ${overflow} лишн. плитк. уйдёт на пол.`);
  } else {
    tips.push(`Сброс в пол — жертва очков ради позиции (не портить линии и/или не отдать плитки боту).`);
  }

  // denial: не отдать нужный цвет боту
  for (let d = 0; d < 5; d++) {
    const l = opp.lines[d];
    if (l.color === mv.color && l.count < d + 1) {
      tips.push(`Заодно лишаете бота: его линия ${d + 1} ждёт этот цвет (${l.count}/${d + 1}).`);
      break;
    }
  }

  // жетон
  if (mv.source === 'center' && s.firstTakenBy === null) {
    tips.push(`Возьмёте жетон первого игрока: −1 в этом раунде, зато первый выбор в следующем.`);
  }

  const fl = me.floor.reduce((a, b) => a + b, 0) + (me.hasToken ? 1 : 0);
  if (fl >= 3) tips.push(`На полу уже ${fl} — каждый следующий сброс дороже (−2, потом −3).`);

  return tips.slice(0, 4);
}

// ---------- стратегия на партию (долгосрочный план, не только текущий ход) ----------

// Плитки цвета k, ещё не осевшие на стенах (мешок/сброс/фабрики/центр/линии/полы циркулируют)
function tilePool(s, k) {
  let onWalls = 0;
  for (const pl of s.players) for (let r = 0; r < 5; r++) if (pl.wall[r][(r + k) % 5]) onWalls++;
  return 20 - onWalls;
}
function circulatingNow(s, k) { // видимые прямо сейчас, до конца раунда
  let n = s.center[k];
  for (let f = 0; f < 5; f++) n += s.factories[f][k];
  return n;
}

// Лучший достижимый столбец для +7: прогресс максимален, остаток дёшев, все цвета ещё в наличии
function columnPlan(s, me) {
  const pl = s.players[me];
  let best = null;
  for (let c = 0; c < 5; c++) {
    let filled = 0, cost = 0, feasible = true;
    const needs = [];
    for (let r = 0; r < 5; r++) {
      if (pl.wall[r][c]) { filled++; continue; }
      const k = (c - r + 5) % 5;
      const have = pl.lines[r].color === k ? pl.lines[r].count : 0;
      const need = r + 1 - have;
      if (tilePool(s, k) < need) { feasible = false; break; }
      cost += need;
      needs.push({ r, k });
    }
    if (!feasible || filled === 5) continue;
    const score = filled * 10 - cost;
    if (!best || score > best.score) best = { c, filled, cost, needs, score };
  }
  return best;
}

// Лучший достижимый цвет для +10
function colorPlan(s, me) {
  const pl = s.players[me];
  let best = null;
  for (let k = 0; k < 5; k++) {
    let filled = 0, cost = 0;
    const needs = [];
    for (let r = 0; r < 5; r++) {
      if (pl.wall[r][(r + k) % 5]) { filled++; continue; }
      const have = pl.lines[r].color === k ? pl.lines[r].count : 0;
      cost += r + 1 - have;
      needs.push(r);
    }
    if (filled === 5 || tilePool(s, k) < cost) continue;
    const score = filled * 10 - cost;
    if (!best || score > best.score) best = { k, filled, cost, needs, score };
  }
  return best;
}

function strategyAdvice(s) {
  const tips = [];
  const me = s.players[HUMAN], opp = s.players[BOT];

  const col = columnPlan(s, HUMAN);
  if (col && col.filled >= 1) {
    const rows = col.needs.map((n) => `${n.r + 1} (${COLOR_NOM[n.k]})`).join(', ');
    tips.push(`Ваш лучший путь к +7 — столбец ${col.c + 1}: собрано ${col.filled}/5, осталось закрыть ряды ${rows}, ~${col.cost} плиток.`);
  }
  const colr = colorPlan(s, HUMAN);
  if (colr && colr.filled >= 2) {
    tips.push(`Бонус +10 за «${COLOR_NOM[colr.k]}» достижим: ${colr.filled}/5, не хватает рядов ${colr.needs.map((r) => r + 1).join(', ')}; таких плиток в обороте ещё ${tilePool(s, colr.k)}.`);
  }

  // темп партии
  const rowMax = (pl) => Math.max(...pl.wall.map((row) => row.filter(Boolean).length));
  const myMax = rowMax(me), oppMax = rowMax(opp);
  const lead = me.score - opp.score;
  if (oppMax === 4) {
    tips.push(`⚠ Бот в одной плитке от полного ряда — партия может кончиться уже в этом раунде: длинные планы рискованны, берите очки сейчас.`);
  } else if (lead >= 5 && myMax >= 3) {
    tips.push(`Вы впереди на ${lead} — выгодно ускорять финал: доводите ряд ${me.wall.findIndex((row) => row.filter(Boolean).length === myMax) + 1} и не дайте боту дособрать его бонусы.`);
  } else if (lead <= -5) {
    tips.push(`Вы позади на ${-lead} — не торопите конец партии: тяните раунды и добирайте столбец/цвет, ботовская фора тает на бонусах.`);
  }

  // дефицит ключевого цвета плана в текущем раунде
  const keyColor = col && col.needs.length ? col.needs[0].k : (colr ? colr.k : null);
  if (keyColor !== null) {
    const circ = circulatingNow(s, keyColor);
    if (circ > 0 && circ <= 4) tips.push(`«${COLOR_NOM[keyColor]}» в этом раунде осталось всего ${circ} — нужный для плана цвет разбирают, берите при возможности.`);
  }

  if (!tips.length) {
    tips.push(`Ранняя партия: заведите длинные ряды (4–5) уже сейчас — им нужно несколько раундов, а очки за них выше; быстрые очки добирайте рядами 1–2.`);
  }
  return tips.slice(0, 3);
}

el('pb0').addEventListener('click', (e) => {
  const t = e.target.closest('[data-dest]');
  if (!t || !selected || busy) return;
  const dest = t.dataset.dest === 'floor' ? 'floor' : Number(t.dataset.dest);
  const mv = { ...selected, dest };
  let next;
  try { next = applyMove(game, mv); } catch { return; }
  describeMove('Вы', game, mv);
  history.push({ state: game, move: mv, round: game.round }); // game иммутабелен — ссылка безопасна
  game = next;
  selected = null; botTook = null; freshCells = []; hintMove = null;
  Sound.clack();
  moveNo++;
  render();
  proceed();
});

el('btnNew').addEventListener('click', () => {
  if (game && game.phase !== 'over' && !confirmReset()) return;
  startGame();
});
let resetArmed = false;
function confirmReset() {
  if (resetArmed) { resetArmed = false; return true; }
  resetArmed = true;
  el('btnNew').textContent = 'Точно? Партия пропадёт';
  setTimeout(() => { resetArmed = false; el('btnNew').textContent = 'Новая партия'; }, 2500);
  return false;
}

function describeMove(who, s, mv) {
  const n = mv.source === 'factory' ? s.factories[mv.factory][mv.color] : s.center[mv.color];
  const from = mv.source === 'factory' ? `с фабрики ${mv.factory + 1}` : 'из центра';
  const to = mv.dest === 'floor' ? 'на пол' : `в ряд ${mv.dest + 1}`;
  addLog(`<b>${who}</b>: ${n} ${COLOR_PL[mv.color]} ${from} → ${to}`);
}

// ---------- ход игры ----------

function proceed() {
  if (isDraftOver(game)) { finishRound(); return; }
  if (game.current === BOT) {
    busy = true;
    renderStatus(); renderBoard(0); renderBoard(1);
    botMove();
  }
}

async function botMove() {
  const level = Number(el('level').value);
  const seed = (botSeedBase + moveNo * 2654435761) >>> 0;
  const token = gameToken;
  const mn = moveNo; // M2: стейл-вызов после применённого хода отсекается по moveNo
  try {
    const [mv] = await Promise.all([
      askBot(game, { level, seed, timeMs: 1000 }),
      sleep(650), // минимальная пауза, чтобы ход бота читался глазами
    ]);
    if (token !== gameToken || mn !== moveNo || game.phase !== 'draft' || game.current !== BOT) return;
    describeMove('Бот', game, mv);
    botTook = { source: mv.source, factory: mv.factory, color: mv.color };
    game = applyMove(game, mv);
    moveNo++;
    Sound.clack(0.35);
  } catch (e) {
    // последний рубеж: любой сбой бота не должен замораживать партию
    if (token !== gameToken || mn !== moveNo || game.phase !== 'draft' || game.current !== BOT) return;
    const mv = legalMoves(game)[0];
    const msg = String(e && e.message || e).replace(/[<>&]/g, '');
    addLog(`<b>Бот</b>: сбой ИИ (${msg}) — сделан запасной ход`);
    botTook = null;
    game = applyMove(game, mv);
    moveNo++;
  }
  busy = false;
  render();
  proceed();
}

function finishRound() {
  busy = true;
  const prevRound = game.round;
  const { state, log } = resolveRound(game);
  game = state;
  freshCells = log.placements.map((p) => [p.player, p.row, p.col]);
  showRoundSheet(prevRound, log);
  render();
}

function showRoundSheet(roundNo, log) {
  const name = (p) => (p === HUMAN ? 'Вы' : 'Бот');
  let rows = '';
  for (const pl of log.placements) {
    rows += `<tr><td>${name(pl.player)}: ${tileHtml(pl.color, '', 18)} ряд ${pl.row + 1}</td><td class="pts">+${pl.pts}</td></tr>`;
  }
  for (const f of log.floors) {
    if (f.penalty > 0) rows += `<tr><td>${name(f.player)}: пол (${f.tiles})</td><td class="pen">−${f.penalty}</td></tr>`;
  }
  if (!rows) rows = `<tr><td class="mut">Никто ничего не выложил</td><td></td></tr>`;
  let html = `<h2>Раунд ${roundNo} — итоги</h2><table>${rows}</table>`;
  html += `<table><tr><td>Ваш счёт</td><td>${game.players[0].score - (log.bonuses ? log.bonuses[0].bonus : 0)}</td></tr>
           <tr><td>Счёт бота</td><td>${game.players[1].score - (log.bonuses ? log.bonuses[1].bonus : 0)}</td></tr></table>`;
  if (log.gameOver) {
    const b0 = log.bonuses[0], b1 = log.bonuses[1];
    const wtxt = log.winner === 'tie' ? 'Ничья!' : log.winner === HUMAN ? '🏆 Вы победили!' : '🤖 Бот победил';
    html += `<h2 style="margin-top:14px">${wtxt}</h2>
      <div class="go">${game.players[0].score} : ${game.players[1].score}</div>
      <table>
        <tr><td>Ваши бонусы <span class="mut">(ряды ${b0.rows}×2, столбцы ${b0.cols}×7, цвета ${b0.colors}×10)</span></td><td class="pts">+${b0.bonus}</td></tr>
        <tr><td>Бонусы бота <span class="mut">(ряды ${b1.rows}×2, столбцы ${b1.cols}×7, цвета ${b1.colors}×10)</span></td><td class="pts">+${b1.bonus}</td></tr>
      </table>
      <div style="display:flex; gap:10px;">
        <button class="act" id="sheetBtn">Новая партия</button>
        <button class="act ghost" id="btnAnalyze">🔍 Разбор партии</button>
      </div>
      <div id="analysisBox"></div>`;
  } else {
    html += `<button class="act" id="sheetBtn">Раунд ${game.round} →</button>`;
  }
  el('sheet').innerHTML = html;
  el('overlay').hidden = false;
  if (log.gameOver) {
    Sound.chime(log.winner === HUMAN ? 'win' : log.winner === 'tie' ? 'tie' : 'lose');
    el('btnAnalyze').addEventListener('click', renderAnalysis, { once: true });
  }
  el('sheetBtn').addEventListener('click', (ev) => {
    ev.target.disabled = true; // M2: защита от двойного клика
    el('overlay').hidden = true;
    if (game.phase === 'over') { startGame(); return; }
    busy = false;
    addLog(`— Раунд ${game.round} —`);
    render();
    proceed();
  }, { once: true });
}

// ---------- пост-разбор партии: каждый ваш ход против выбора L2 ----------

function fmtMove(s, m) {
  const n = m.source === 'factory' ? s.factories[m.factory][m.color] : s.center[m.color];
  const from = m.source === 'factory' ? `с фабрики ${m.factory + 1}` : 'из центра';
  const to = m.dest === 'floor' ? 'пол' : `ряд ${m.dest + 1}`;
  return `${n} ${COLOR_PL[m.color]} ${from} → ${to}`;
}

function renderAnalysis() {
  const box = el('analysisBox');
  box.innerHTML = `<p class="mut" style="font-size:14px">Считаю…</p>`;
  setTimeout(() => {
    const rows = [];
    for (const h of history) {
      const legal = legalMoves(h.state);
      if (legal.length <= 1) continue;
      let bestV = -Infinity, bestM = null;
      for (const m of legal) {
        const v = _valueOfMove(h.state, m, 2);
        if (v > bestV) { bestV = v; bestM = m; }
      }
      const loss = bestV - _valueOfMove(h.state, h.move, 2);
      rows.push({ ...h, loss, bestM });
    }
    const total = rows.length;
    const good = rows.filter((r) => r.loss <= 0.75).length;
    const sumLoss = rows.reduce((a, r) => a + Math.max(0, r.loss), 0);
    const top = rows.filter((r) => r.loss > 0.75).sort((a, b) => b.loss - a.loss).slice(0, 5);
    let html = `<h2 style="margin-top:18px">Разбор партии</h2>
      <table>
        <tr><td>Точных ходов <span class="mut">(потеря ≤ 0.75)</span></td><td>${good} из ${total} (${total ? Math.round((good / total) * 100) : 0}%)</td></tr>
        <tr><td>Суммарно недобрано</td><td>≈ ${sumLoss.toFixed(1)} очк. потенциала</td></tr>
      </table>`;
    if (!top.length) {
      html += `<p style="font-size:14px; margin-top:10px">Крупных ошибок нет — образцовая партия! 🏅</p>`;
    } else {
      html += `<div style="display:flex; flex-direction:column; gap:8px; margin-top:10px">` + top.map((r) => `
        <div class="mistake">
          <div><b>Раунд ${r.round}</b> · потеря ≈ ${r.loss.toFixed(1)}</div>
          <div>Вы: ${fmtMove(r.state, r.move)}</div>
          <div class="better">Сильнее: ${fmtMove(r.state, r.bestM)}</div>
        </div>`).join('') + `</div>
        <p class="mut" style="font-size:12px; margin-top:8px">Оценка — просчёт на 2 хода вперёд той же функцией, что у сильного бота; «очки потенциала» включают будущие бонусы и штрафы.</p>`;
    }
    box.innerHTML = html;
  }, 30);
}

startGame();
